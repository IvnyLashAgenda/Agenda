<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivny Lash Agenda</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --rosa-principal: #ff758f;
            --rosa-banner: #ffb1c1;
            --roxo-principal: #7d5fff;
            --roxo-escuro: #4b36c4;
            --fundo-pagina: #f5f6fa;
            --fundo-app: #ffffff;
            --texto: #2d3436;
        }
        
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--fundo-pagina);
            color: var(--texto);
            display: flex;
            justify(content): center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 430px; 
            background: var(--fundo-app);
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            padding-bottom: 40px;
            margin: 0 auto;
        }

        .header-banner {
            background-color: var(--rosa-banner);
            height: 140px;
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 70px;
            width: 100%;
        }

        .logo-perfil {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            bottom: -60px;
            border: 4px solid var(--fundo-app);
            box-shadow: 0 4px 15px rgba(125, 95, 255, 0.15);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-perfil img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Texto interno da logo redonda para a segunda camada */
        .logo-formulario-texto {
            color: var(--rosa-principal);
            font-weight: 700;
            font-size: 18px;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .boas-vindas {
            text-align: center;
            padding: 0 25px;
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-manutencao {
            display: block;
            width: fit-content;
            margin: 0 auto 35px auto;
            background-color: #f1edff;
            color: var(--roxo-escuro);
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-manutencao:hover {
            background-color: var(--roxo-principal);
            color: white;
        }

        .titulo-secao {
            text-align: center;
            color: var(--rosa-principal);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .lista-servicos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 15px;
            width: 100%;
        }

        .card-cilios {
            background: var(--fundo-app);
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .card-cilios img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            background-color: #fafafa;
            flex-shrink: 0;
        }

        .card-info {
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .card-info h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--texto);
            margin: 0 0 4px 0;
            line-height: 1.3;
        }

        .card-info p {
            font-size: 10.5px;
            color: #666;
            line-height: 1.3;
            margin: 0 0 8px 0;
        }

        .valores-bloco {
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: flex-start;
        }

        .preco-principal {
            color: var(--rosa-principal);
            font-weight: 700;
            font-size: 13px;
        }

        .preco-manut {
            font-size: 10px;
            color: var(--roxo-principal);
            font-weight: 500;
        }

        /* Camada do Formulário (Oculta incialmente) */
        .formulario-bloco {
            padding: 0 20px;
            display: none;
            width: 100%;
        }

        .btn-voltar {
            color: var(--rosa-principal);
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 25px;
        }

        /* Caixa de Regras do Print do TikTok */
        .regras-studio {
            background: #fff5f6;
            border: 1px solid #ffe3e7;
            border-left: 4px solid var(--rosa-principal);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .regras-studio h4 { 
            margin: 0 0 10px 0; 
            color: var(--rosa-principal); 
            font-size: 14px; 
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .regras-studio ul { 
            padding-left: 18px; 
            font-size: 12.5px; 
            color: #444; 
            line-height: 1.6; 
            list-style-type: disc; 
        }

        .regras-studio ul strong {
            color: #111;
        }

        .titulo-formulario {
            color: var(--rosa-principal);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .campo { margin-bottom: 18px; width: 100%; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: #111; }
        
        input, select, textarea {
            width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 12px;
            background: #f8fafc; font-size: 13.5px; box-sizing: border-box; transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--rosa-principal); outline: none; background: var(--fundo-app); }

        /* Estilo Cinza Travado para o Serviço Escolhido */
        input#servico_visivel {
            background-color: #f1f3f5;
            color: #495057;
            border: 1px solid #ced4da;
            cursor: not-allowed;
            font-weight: 500;
        }

        .checkbox-group {
            display: flex; align-items: center; gap: 10px; background: var(--fundo-app);
            padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 10px;
            width: 100%;
        }
        .checkbox-group input { width: 16px; height: 16px; accent-color: var(--roxo-principal); margin: 0; flex-shrink: 0; }
        .checkbox-group label { font-size: 12.5px; color: var(--texto); font-weight: 400; margin: 0; }

        .bloco-pagamento {
            background: #fff8f9; border: 2px dashed var(--rosa-banner);
            padding: 18px; border-radius: 14px; text-align: center; margin-top: 25px;
            width: 100%;
        }
        .bloco-pagamento h4 { margin-bottom: 5px; color: var(--rosa-principal); font-size: 14px; }
        .bloco-pagamento p { font-size: 12px; color: #555; margin: 4px 0; }
        .chave-pix {
            background: var(--fundo-app); padding: 8px 14px; border-radius: 8px; border: 1px solid #ffe3e7;
            display: inline-block; font-weight: 600; font-size: 12.5px; color: var(--roxo-escuro); margin: 8px 0;
        }

        .btn-finalizar {
            background: linear-gradient(135deg, #25d366 0%, #1ebd59 100%); color: white; border: none; padding: 14px;
            width: 100%; border-radius: 10px; font-size: 14px; font-weight: 600;
            cursor: pointer; margin-top: 20px; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <div class="logo-perfil" id="container-logo-mudavel">
            <img src="./foto-perfil.jpg.jpg" alt="Foto de Perfil" onerror="this.src='./foto-perfil.jpg'">
        </div>
    </div>

    <!-- PRIMEIRA CAMADA: Catálogo Completo -->
    <div id="secao-catalogo">
        <p class="boas-vindas">
            Oi miguxas 💕✨<br>
            Vamos realçar seus olhares e deixar vocês ainda mais lindas? 😍<br>
            Agende seu horário e venha se sentir poderosa com cílios feitos especialmente para você! 💖👁️✨
        </p>

        <button class="btn-manutencao" onclick="rolarParaModelos()">Agendar Manutenção</button>

        <h2 class="titulo-secao">Modelos de cílios</h2>

        <div class="lista-servicos" id="lista-modelos">
            
            <div class="card-cilios" onclick="trocarCamadaFormulario('Fio a Fio Clássico', 'R$ 95,00')">
